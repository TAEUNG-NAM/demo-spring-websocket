<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 메시지 전송</title>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .panel {
            width: 320px;
        }

        #canvasWrapper {
            position: relative;
            border: 1px solid #ccc;
            width: 800px;
            height: 500px;
            background: #fafafa;
            overflow: hidden;
        }

        #drawCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .remote-cursor {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }

        .remote-cursor-label {
            position: absolute;
            top: 14px;
            left: 14px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }

        #notifications {
            margin-top: 12px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 8px;
        }
    </style>
</head>
<body>
<h1>실시간 메시지 전송</h1>

<div class="layout">
    <div class="panel">
        <div>
            <input type="text" id="message" placeholder="메시지를 입력하세요.">
            <input type="text" id="sender" placeholder="닉네임">
            <button onclick="sendMessage()">Send</button>
        </div>

        <div id="notifications"></div>
    </div>

    <div id="canvasWrapper">
        <canvas id="drawCanvas"></canvas>
    </div>
</div>

<script>
    let stompClient = null;
    let canvas = null;
    let ctx = null;
    const myCursorId = 'cursor-' + Math.random().toString(36).slice(2, 9);
    const remoteCursors = new Map();
    const renderedCircleIds = new Set();
    const DEFAULT_CIRCLE_SIZE = 48;

    function connect() {
        const socket = new WebSocket('ws://localhost:8080/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);

            stompClient.subscribe('/topic/chat', function (message) {
                showNotification(message.body);
            });

            stompClient.subscribe('/topic/canvas', function (message) {
                console.log(message);
                const wsMessage = JSON.parse(message.body);
                console.log(wsMessage);
                handleCanvasMessage(wsMessage);
            });
        }, function (error) {
            console.error('WebSocket connection error: ' + error);
        });
    }

    function sendMessage() {
        const message = document.getElementById('message').value;
        const sender = document.getElementById('sender').value;
        if (stompClient && stompClient.connected) {
            stompClient.send('/app/chat/message', {}, JSON.stringify({
                content: message,
                sender: sender
            }));
            console.log(`Message sent: ${message} (${sender})`);
        } else {
            console.error('WebSocket connection is not established.');
        }
    }

    function showNotification(message) {
        const notifications = document.getElementById('notifications');
        const notification = document.createElement('p');
        notification.textContent = message;
        notifications.appendChild(notification);
    }

    function handleCanvasMessage(wsMessage) {
        if (!wsMessage) return;

        switch (wsMessage.action) {
            case 'CURSOR_MOVE':
                moveCursor(wsMessage.payload);
                break;
            case 'CIRCLE_CREATED':
                renderCreatedCircle(wsMessage.payload);
                break;
            default:
                if (wsMessage.payload && wsMessage.payload.senderId) {
                    moveCursor(wsMessage.payload);
                }
        }
    }

    function initCanvas() {
        canvas = document.getElementById('drawCanvas');
        ctx = canvas.getContext('2d');

        resizeCanvas();

        window.addEventListener('resize', resizeCanvas);

        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('mousemove', sendCursorMove);
    }

    function resizeCanvas() {
        const wrapper = document.getElementById('canvasWrapper');
        const rect = wrapper.getBoundingClientRect();

        const oldCanvas = document.createElement('canvas');
        oldCanvas.width = canvas ? canvas.width : rect.width;
        oldCanvas.height = canvas ? canvas.height : rect.height;
        const oldCtx = oldCanvas.getContext('2d');

        if (canvas) {
            oldCtx.drawImage(canvas, 0, 0);
        }

        canvas.width = rect.width;
        canvas.height = rect.height;

        if (oldCanvas.width && oldCanvas.height) {
            ctx.drawImage(oldCanvas, 0, 0);
        }
    }

    function handleCanvasClick(e) {
        const [x, y] = getCanvasPos(e);
        createCircle(x, y);
    }

    function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return [
            e.clientX - rect.left,
            e.clientY - rect.top
        ];
    }

    function sendCursorMove(e) {
        if (!stompClient || !stompClient.connected) return;

        const [x, y] = getCanvasPos(e);
        const sender = document.getElementById('sender').value || 'anonymous';

        stompClient.send('/app/canvas/cursor', {}, JSON.stringify({
            senderId: myCursorId,
            x: x,
            y: y,
            color: '#ff158b',
            sender: sender
        }));
    }

    async function createCircle(x, y) {
        try {
            const response = await fetch('/api/v1/canvas/circles', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(buildCirclePayload(x, y))
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            showNotification(`Circle create requested at (${Math.round(x)}, ${Math.round(y)})`);
        } catch (error) {
            console.error('Circle creation failed:', error);
            showNotification(`Circle creation failed: ${error.message}`);
        }
    }

    function buildCirclePayload(x, y) {
        const color = randomCircleColor();

        return {
            x: x,
            y: y,
            size: DEFAULT_CIRCLE_SIZE,
            r: color.r,
            g: color.g,
            b: color.b,
            a: 0.85
        };
    }

    function randomCircleColor() {
        return {
            r: Math.random(),
            g: Math.random(),
            b: Math.random()
        };
    }

    function moveCursor(cursor) {
        if (!cursor || !cursor.senderId) return;

        if (cursor.senderId === myCursorId) {
            return;
        }

        let cursorEl = document.getElementById(cursor.senderId);

        if (!cursorEl) {
            cursorEl = document.createElement('div');
            cursorEl.id = cursor.senderId;
            cursorEl.className = 'remote-cursor';
            cursorEl.innerHTML = '<div class="remote-cursor-label"></div>';
            document.getElementById('canvasWrapper').appendChild(cursorEl);
            remoteCursors.set(cursor.senderId, cursorEl);
        }

        cursorEl.style.left = cursor.x + 'px';
        cursorEl.style.top = cursor.y + 'px';
        cursorEl.style.background = cursor.color || '#ff5722';

        const label = cursorEl.querySelector('.remote-cursor-label');
        label.textContent = cursor.sender || cursor.senderId;
    }

    function renderCreatedCircle(circle) {
        if (!circle) return;

        if (circle.id && renderedCircleIds.has(circle.id)) {
            return;
        }

        drawCircle(circle);

        if (circle.id) {
            renderedCircleIds.add(circle.id);
        }

        showNotification(`Circle created${circle.id ? `: ${circle.id}` : ''}`);
    }

    function drawCircle(circle) {
        const x = Number(circle.x);
        const y = Number(circle.y);
        const radius = Number(circle.size) / 2;

        if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(radius) || radius <= 0) {
            return;
        }

        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = toCircleFill(circle);
        ctx.fill();
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.stroke();
    }

    function toCircleFill(circle) {
        const r = toColorChannel(circle.r);
        const g = toColorChannel(circle.g);
        const b = toColorChannel(circle.b);
        const a = toAlphaChannel(circle.a);
        return `rgba(${r}, ${g}, ${b}, ${a})`;
    }

    function toColorChannel(value) {
        const numeric = Number(value);

        if (!Number.isFinite(numeric)) {
            return 0;
        }

        const scaled = numeric <= 1 ? numeric * 255 : numeric;
        return Math.max(0, Math.min(255, Math.round(scaled)));
    }

    function toAlphaChannel(value) {
        const numeric = Number(value);

        if (!Number.isFinite(numeric)) {
            return 1;
        }

        const scaled = numeric <= 1 ? numeric : numeric / 255;
        return Math.max(0, Math.min(1, scaled));
    }

    connect();
    initCanvas();
</script>
</body>
</html>
