<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 메시지 전송</title>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .panel {
            width: 320px;
        }

        #canvasWrapper {
            position: relative;
            border: 1px solid #ccc;
            width: 800px;
            height: 500px;
            background: #fafafa;
            overflow: hidden;
        }

        #drawCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .remote-cursor {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }

        .remote-cursor-label {
            position: absolute;
            top: 14px;
            left: 14px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }

        #notifications {
            margin-top: 12px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 8px;
        }
    </style>
</head>
<body>
<h1>실시간 메시지 전송</h1>

<div class="layout">
    <div class="panel">
        <div>
            <input type="text" id="message" placeholder="메시지를 입력하세요.">
            <input type="text" id="sender" placeholder="닉네임">
            <button onclick="sendMessage()">Send</button>
        </div>

        <div id="notifications"></div>
    </div>

    <div id="canvasWrapper">
        <canvas id="drawCanvas"></canvas>
    </div>
</div>

<script>
    let stompClient = null;
    let canvas = null;
    let ctx = null;
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    const myCursorId = 'cursor-' + Math.random().toString(36).slice(2, 9);
    const remoteCursors = new Map();

    function connect() {
        const socket = new WebSocket('ws://localhost:8080/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);

            stompClient.subscribe('/topic/chat', function (message) {
                showNotification(message.body);
            });

            stompClient.subscribe('/topic/canvas/cursor', function (message) {
                const cursor = JSON.parse(message.body);
                moveCursor(cursor.payload);
            });
        }, function (error) {
            console.error('WebSocket connection error: ' + error);
        });
    }

    function sendMessage() {
        const message = document.getElementById('message').value;
        const sender = document.getElementById('sender').value;
        if (stompClient && stompClient.connected) {
            stompClient.send('/app/chat/message', {}, JSON.stringify({
                content: message,
                sender: sender
            }));
            console.log(`Message sent: ${message} (${sender})`);
        } else {
            console.error('WebSocket connection is not established.');
        }
    }

    function showNotification(message) {
        const notifications = document.getElementById('notifications');
        const notification = document.createElement('p');
        notification.textContent = message;
        notifications.appendChild(notification);
    }

    function initCanvas() {
        canvas = document.getElementById('drawCanvas');
        ctx = canvas.getContext('2d');

        resizeCanvas();

        window.addEventListener('resize', resizeCanvas);

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', handleCanvasMove);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);

        canvas.addEventListener('mousemove', sendCursorMove);
    }

    function resizeCanvas() {
        const wrapper = document.getElementById('canvasWrapper');
        const rect = wrapper.getBoundingClientRect();

        const oldCanvas = document.createElement('canvas');
        oldCanvas.width = canvas ? canvas.width : rect.width;
        oldCanvas.height = canvas ? canvas.height : rect.height;
        const oldCtx = oldCanvas.getContext('2d');

        if (canvas) {
            oldCtx.drawImage(canvas, 0, 0);
        }

        canvas.width = rect.width;
        canvas.height = rect.height;

        if (oldCanvas.width && oldCanvas.height) {
            ctx.drawImage(oldCanvas, 0, 0);
        }
    }

    function startDraw(e) {
        isDrawing = true;
        [lastX, lastY] = getCanvasPos(e);
    }

    function stopDraw() {
        isDrawing = false;
    }

    function handleCanvasMove(e) {
        if (!isDrawing) return;

        const [x, y] = getCanvasPos(e);

        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.stroke();

        lastX = x;
        lastY = y;
    }

    function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return [
            e.clientX - rect.left,
            e.clientY - rect.top
        ];
    }

    function sendCursorMove(e) {
        if (!stompClient || !stompClient.connected) return;

        const [x, y] = getCanvasPos(e);
        const sender = document.getElementById('sender').value || 'anonymous';

        stompClient.send('/app/canvas/cursor', {}, JSON.stringify({
            senderId: myCursorId,
            x: x,
            y: y,
            color: '#ff158b',
            sender: sender
        }));
    }

    function moveCursor(cursor) {
        if (!cursor || !cursor.senderId) return;

        if (cursor.senderId === myCursorId) {
            return;
        }

        let cursorEl = document.getElementById(cursor.senderId);

        if (!cursorEl) {
            cursorEl = document.createElement('div');
            cursorEl.id = cursor.senderId;
            cursorEl.className = 'remote-cursor';
            cursorEl.innerHTML = '<div class="remote-cursor-label"></div>';
            document.getElementById('canvasWrapper').appendChild(cursorEl);
            remoteCursors.set(cursor.senderId, cursorEl);
        }

        cursorEl.style.left = cursor.x + 'px';
        cursorEl.style.top = cursor.y + 'px';
        cursorEl.style.background = cursor.color || '#ff5722';

        const label = cursorEl.querySelector('.remote-cursor-label');
        label.textContent = cursor.sender || cursor.senderId;
    }

    connect();
    initCanvas();
</script>
</body>
</html>
