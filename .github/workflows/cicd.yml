name: Spring Boot CI/CD

on:
  pull_request:
    branches: [ "main" ]

  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Test
        run: ./gradlew test

      - name: Build
        run: ./gradlew clean build

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jar
          path: build/libs/*.jar

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-jar

      - name: Copy jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "*.jar"
          target: "/home/ubuntu/app"

      - name: Restart Spring Boot application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: false # 스크립트 실패해도 멈추지 말라는 옵션(kill 안될 수도 있어서)
          script: |
            echo "기존 배포 중인 애플리케이션 종료 후 새로운 어플리케이션 실행!"
            cd /home/ubuntu/app
            JAR_NAME=$(ls *.jar | head -n 1)
            chmod +x start.sh || true
            ./start.sh
            
            # nohup을 통해 터미널 종료되어도 프로세스 종료되지 않게 하고, nohub.out에 애플리케이션에서 생성되는 로그들 계속 남김
            # log 계속 쌓이면 EC2 디스크 용량 부족해질 수 있으니 주기적으로 정리 필요한거 리마인드하기
            
            sleep 2
            echo "실행 상태 확인"
            ps -ef | grep "$JAR_NAME" || echo "실행 안 됨" # java 프로세스 잘 실행되고 있는지 확인
            
            sleep 15
            sudo lsof -i:8080 || true  # 8080 포트로 애플리케이션이 잘 실행되고 있는지 확인
            
            echo "배포 성공 ~"
